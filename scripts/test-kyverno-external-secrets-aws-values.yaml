# Overlay for scripts/validate-kyverno.sh — exercises AWS Secrets Manager path rules on deny-external-secrets.
globalExclusions:
  additional:
    - cert-manager
    - external-secrets

policies:
  denyExternalSecrets:
    enabled: true
    validationFailureAction: audit
    useAwsSecretsManagerPaths: true
    aws:
      clusterName: dev
      clusterSecretStoreName: secrets-store
      globalSegment: global
      secretsPrefix: SECRETS

  denyDefaultNamespace:
    enabled: true
    validationFailureAction: audit
  denyEksResources:
    enabled: true
    validationFailureAction: audit
  denyEmptyIngress:
    enabled: true
    validationFailureAction: audit
  denyLatestImage:
    enabled: true
    validationFailureAction: audit
  denyNoLabels:
    enabled: true
    validationFailureAction: audit
  denyNoLimits:
    enabled: true
    validationFailureAction: audit
  denyNoPodProbes:
    enabled: true
    validationFailureAction: audit
  denyNoTrafficDistribution:
    enabled: false
    validationFailureAction: audit
  denyNodeportService:
    enabled: true
    validationFailureAction: audit
  mutateEcrCache:
    enabled: false
    validationFailureAction: audit
  mutatePsaLabels:
    enabled: true
    validationFailureAction: audit
  mutateTrafficDistribution:
    enabled: false
    validationFailureAction: audit
  restrictImageRegistries:
    enabled: true
    useComplexConfig: false
    validationFailureAction: audit
    allowedRegistries:
      - gcr.io
      - docker.io

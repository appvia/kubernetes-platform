apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: deny-external-secrets
policies:
  - ../policy.yaml
resources:
  - resources.yaml
results:
  - kind: ExternalSecret
    policy: deny-external-secrets
    rule: namespace-prefix-keys
    resources:
      - bad-legacy
    result: fail
  - kind: ExternalSecret
    policy: deny-external-secrets
    rule: namespace-prefix-keys
    resources:
      - good-legacy
    result: pass

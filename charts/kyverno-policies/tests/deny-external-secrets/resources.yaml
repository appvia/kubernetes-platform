---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: good-legacy
  namespace: my-namespace
spec:
  secretStoreRef:
    name: tenant-store
    kind: SecretStore
  data:
    - secretKey: password
      remoteRef:
        key: my-namespace/secret-ok
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bad-legacy
  namespace: my-different-namespace
spec:
  secretStoreRef:
    name: tenant-store
    kind: SecretStore
  data:
    - secretKey: password
      remoteRef:
        key: my-namespace/not-allowed

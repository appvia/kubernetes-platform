# Test values for deny-nodeport-service with per-policy exclusion
# This test verifies that the ingress-system namespace is excluded from the NodePort policy

globalExclusions:
  always:
    - kube-system
    - argocd
  additional: []

policies:
  denyNodeportService:
    enabled: true
    validationFailureAction: enforce
    # Exclude ingress-system namespace specifically for this policy
    excludeNamespaces:
      - ingress-system

  # Disable other policies for this test
  denyDefaultNamespace:
    enabled: false
  denyEksResources:
    enabled: false
  denyEmptyIngress:
    enabled: false
  denyExternalSecrets:
    enabled: false
  denyLatestImage:
    enabled: false
  denyNoLabels:
    enabled: false
  denyNoLimits:
    enabled: false
  denyNoPodProbes:
    enabled: false
  denyNoTrafficDistribution:
    enabled: false
  mutateEcrCache:
    enabled: false
  mutatePsaLabels:
    enabled: false
  mutateTrafficDistribution:
    enabled: false
  restrictImageRegistries:
    enabled: false

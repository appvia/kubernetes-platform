---
# Kyverno test cases for deny-nodeport-service with per-policy exclusion
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: kyverno-test
spec:
  validationFailureAction: audit
  background: false
  rules:
    - name: test-cases
      match:
        resources:
          kinds:
            - Service
      validate:
        message: "This is a test placeholder"
        pattern:
          metadata:
            name: "test-*"
tests:
  - name: "deny-nodeport-service with per-policy exclusion"
    resources:
      - resources.yaml
    policies:
      - ../../../templates/deny-nodeport-service.yaml
    ruleIndex: 0
    results:
      # Should FAIL: NodePort in default namespace (not excluded)
      - resource: Service/default/denied-nodeport
        rule: deny-nodeport-service
        result: fail
      
      # Should PASS: NodePort in ingress-system namespace (policy-specific exclusion)
      - resource: Service/ingress-system/allowed-nodeport-in-ingress-system
        rule: deny-nodeport-service
        result: pass
      
      # Should PASS: NodePort in kube-system namespace (global exclusion)
      - resource: Service/kube-system/allowed-nodeport-in-kube-system
        rule: deny-nodeport-service
        result: pass
      
      # Should PASS: ClusterIP service in default namespace (not NodePort)
      - resource: Service/default/allowed-clusterip
        rule: deny-nodeport-service
        result: pass

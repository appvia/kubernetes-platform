---
# Test resources for deny-nodeport-service with per-policy exclusion
apiVersion: v1
kind: Service
metadata:
  name: denied-nodeport
  namespace: default
spec:
  type: NodePort
  selector:
    app: test
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: allowed-nodeport-in-ingress-system
  namespace: ingress-system
spec:
  type: NodePort
  selector:
    app: ingress-controller
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: allowed-nodeport-in-kube-system
  namespace: kube-system
spec:
  type: NodePort
  selector:
    app: dns
  ports:
    - port: 53
      targetPort: 5353
---
apiVersion: v1
kind: Service
metadata:
  name: allowed-clusterip
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: test
  ports:
    - port: 80
      targetPort: 8080

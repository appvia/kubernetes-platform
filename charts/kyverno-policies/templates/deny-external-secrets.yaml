{{- if .Values.policies.denyExternalSecrets.enabled }}
{{- $p := .Values.policies.denyExternalSecrets }}
{{- $aws := $p.aws | default dict }}
{{- $cn := $aws.clusterName | default "" }}
{{- $store := $aws.clusterSecretStoreName | default "secrets-store" }}
{{- $globalSeg := $aws.globalSegment | default "global" }}
{{- $secPrefix := $aws.secretsPrefix | default "SECRETS" }}
{{- $globalPrefix := printf "%s/%s/%s" $cn $globalSeg $secPrefix }}
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-external-secrets
  annotations:
    policies.kyverno.io/title: External Secrets — AWS Secrets Manager paths
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      For External Secrets using the platform AWS ClusterSecretStore, Secrets Manager
      names must live under a cluster-scoped hierarchy: shared secrets under
      CLUSTER/global/SECRETS* and namespace-owned secrets under
      CLUSTER/NAMESPACE/SECRETS*. Legacy mode (namespace/key) applies when AWS path mode is off.
spec:
  validationFailureAction: {{ $p.validationFailureAction }}
  background: false
  rules:
{{- if and $p.useAwsSecretsManagerPaths $cn }}
    - name: aws-secrets-manager-paths
      match:
        any:
          - resources:
              kinds:
                - ExternalSecret
      exclude:
        resources:
          namespaces:
{{- include "kyverno-policies.excludedNamespaces" . | indent 12 }}
      validate:
        cel:
          expressions:
            - expression: >-
                !has(object.spec.secretStoreRef) ||
                object.spec.secretStoreRef.kind != "ClusterSecretStore" ||
                object.spec.secretStoreRef.name != "{{ $store }}" ||
                (
                  (!has(object.spec.data) || object.spec.data.all(d,
                    has(d.remoteRef) && has(d.remoteRef.key) && (
                      d.remoteRef.key.startsWith("{{ $globalPrefix }}") ||
                      d.remoteRef.key.startsWith("{{ $cn }}/" + object.metadata.namespace + "/{{ $secPrefix }}")
                    )
                  )) &&
                  (!has(object.spec.dataFrom) || object.spec.dataFrom.all(df,
                    !has(df.extract) || (has(df.extract.key) && (
                      df.extract.key.startsWith("{{ $globalPrefix }}") ||
                      df.extract.key.startsWith("{{ $cn }}/" + object.metadata.namespace + "/{{ $secPrefix }}")
                    ))
                  ))
                )
              message: >-
                Secrets Manager key must start with {{ $globalPrefix }} (shared) or
                {{ $cn }}/<this-namespace>/{{ $secPrefix }} (namespace-scoped) when using {{ $store }} ClusterSecretStore.
{{- else }}
    - name: namespace-prefix-keys
      match:
        any:
          - resources:
              kinds:
                - ExternalSecret
      exclude:
        resources:
          namespaces:
{{- include "kyverno-policies.excludedNamespaces" . | indent 12 }}
      validate:
        cel:
          expressions:
            - expression: >-
                (!has(object.spec.data) || object.spec.data.all(d,
                  has(d.remoteRef) && has(d.remoteRef.key) &&
                  d.remoteRef.key.startsWith(object.metadata.namespace + "/"))) &&
                (!has(object.spec.dataFrom) || object.spec.dataFrom.all(df,
                  !has(df.extract) || (has(df.extract.key) &&
                  df.extract.key.startsWith(object.metadata.namespace + "/"))))
              message: >-
                remoteRef.key and dataFrom.extract.key must start with the ExternalSecret namespace
                followed by '/' (e.g. my-namespace/my-secret).
{{- end }}
{{- end }}

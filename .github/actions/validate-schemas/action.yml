name: 'Validate YAML against schemas'
description: 'Validates cluster and workload YAML files against JSON schemas using check-jsonschema'
inputs:
  version:
    description: 'Git ref (branch, tag, or commit) of the kubernetes-platform repo containing the schemas'
    required: false
    default: 'main'
  clusters:
    description: 'Path(s) to cluster definition YAML files or directories (newline-separated)'
    required: false
    default: ''
  workloads:
    description: 'Path(s) to workload/application YAML files or directories (newline-separated)'
    required: false
    default: ''
  schema_repo:
    description: 'Owner/repo of the kubernetes-platform repository'
    required: false
    default: 'appvia/kubernetes-platform'
runs:
  using: 'composite'
  steps:
    - name: Install check-jsonschema
      shell: bash
      run: |
        pip install check-jsonschema

    - name: Download schemas
      shell: bash
      run: |
        mkdir -p /tmp/platform-schemas
        SCHEMA_REPO="${{ inputs.schema_repo }}"
        VERSION="${{ inputs.version }}"

        if [ -n "${{ inputs.clusters }}" ]; then
          echo "Fetching clusters.json schema..."
          curl -fsSL "https://raw.githubusercontent.com/${SCHEMA_REPO}/${VERSION}/schemas/clusters.json" \
            -o /tmp/platform-schemas/clusters.json
        fi

        if [ -n "${{ inputs.workloads }}" ]; then
          echo "Fetching applications.json schema..."
          curl -fsSL "https://raw.githubusercontent.com/${SCHEMA_REPO}/${VERSION}/schemas/applications.json" \
            -o /tmp/platform-schemas/applications.json
        fi

    - name: Validate cluster definitions
      if: inputs.clusters != ''
      shell: bash
      run: |
        SCHEMA="/tmp/platform-schemas/clusters.json"
        FAILED_FILES=()

        while IFS= read -r path; do
          [ -z "$path" ] && continue

          if [ -d "$path" ]; then
            echo "Validating cluster YAML files in directory: $path"
            while IFS= read -r -d '' file; do
              echo "  Checking: $file"
              if ! check-jsonschema --schemafile "$SCHEMA" "$file" 2>&1; then
                FAILED_FILES+=("$file")
              fi
            done < <(find "$path" -type f \( -name "*.yaml" -o -name "*.yml" \) -print0)
          elif [ -f "$path" ]; then
            echo "Validating cluster file: $path"
            if ! check-jsonschema --schemafile "$SCHEMA" "$path" 2>&1; then
              FAILED_FILES+=("$path")
            fi
          else
            echo "Warning: Cluster path not found: $path"
          fi
        done <<< "${{ inputs.clusters }}"

        if [ ${#FAILED_FILES[@]} -gt 0 ]; then
          echo ""
          echo "Validation failed for the following files:"
          for f in "${FAILED_FILES[@]}"; do
            echo "  - $f"
          done
          exit 1
        fi

        echo "All cluster definitions are valid."

    - name: Validate workload definitions
      if: inputs.workloads != ''
      shell: bash
      run: |
        SCHEMA="/tmp/platform-schemas/applications.json"
        FAILED_FILES=()

        while IFS= read -r path; do
          [ -z "$path" ] && continue

          if [ -d "$path" ]; then
            echo "Validating workload YAML files in directory: $path"
            while IFS= read -r -d '' file; do
              echo "  Checking: $file"
              if ! check-jsonschema --schemafile "$SCHEMA" "$file" 2>&1; then
                FAILED_FILES+=("$file")
              fi
            done < <(find "$path" -type f \( -name "*.yaml" -o -name "*.yml" \) -print0)
          elif [ -f "$path" ]; then
            echo "Validating workload file: $path"
            if ! check-jsonschema --schemafile "$SCHEMA" "$path" 2>&1; then
              FAILED_FILES+=("$path")
            fi
          else
            echo "Warning: Workload path not found: $path"
          fi
        done <<< "${{ inputs.workloads }}"

        if [ ${#FAILED_FILES[@]} -gt 0 ]; then
          echo ""
          echo "Validation failed for the following files:"
          for f in "${FAILED_FILES[@]}"; do
            echo "  - $f"
          done
          exit 1
        fi

        echo "All workload definitions are valid."

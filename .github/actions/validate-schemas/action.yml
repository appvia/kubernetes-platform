---
name: "Validate YAML against schemas"
description: "Validates cluster and workload YAML files against JSON schemas using check-jsonschema"
inputs:
  version:
    description: "Git ref (branch, tag, or commit) of the kubernetes-platform repo containing the schemas"
    required: false
    default: "main"
  clusters:
    description: "Path(s) to cluster definition YAML files or directories (newline-separated)"
    required: false
    default: ""
  workloads:
    description: "Path(s) to workload/application YAML files or directories (newline-separated)"
    required: false
    default: ""
  exclude-dirs:
    description: "Directory names to exclude from validation (newline-separated)"
    required: false
    default: ""
  exclude-files:
    description: "File names to exclude from validation (newline-separated)"
    required: false
    default: ""
  schema_repo:
    description: "Owner/repo of the kubernetes-platform repository"
    required: false
    default: "appvia/kubernetes-platform"
runs:
  using: "composite"
  steps:
    - name: Install check-jsonschema
      shell: bash
      run: pip install check-jsonschema
    - name: Download schemas
      shell: bash
      run: |
        mkdir -p /tmp/platform-schemas
        SCHEMA_REPO="${{ inputs.schema_repo }}"
        VERSION="${{ inputs.version }}"

        if [ -n "${{ inputs.clusters }}" ]; then
          echo "Fetching clusters.json schema..."
          curl -fsSL "https://raw.githubusercontent.com/${SCHEMA_REPO}/${VERSION}/schemas/clusters.json" \
            -o /tmp/platform-schemas/clusters.json
        fi

        if [ -n "${{ inputs.workloads }}" ]; then
          echo "Fetching applications.json schema..."
          curl -fsSL "https://raw.githubusercontent.com/${SCHEMA_REPO}/${VERSION}/schemas/applications.json" \
            -o /tmp/platform-schemas/applications.json
        fi

    - name: Validate cluster definitions
      if: inputs.clusters != ''
      shell: bash
      run: |
        SCHEMA="/tmp/platform-schemas/clusters.json"
        FAILED_FILES=()

        # Build exclude patterns for find
        EXCLUDE_DIR_ARGS=()
        if [ -n "${{ inputs.exclude-dirs }}" ]; then
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            EXCLUDE_DIR_ARGS+=(-not -path "*/${dir}/*")
          done <<< "${{ inputs.exclude-dirs }}"
        fi

        # Build exclude patterns for file names
        EXCLUDE_FILE_ARGS=()
        if [ -n "${{ inputs.exclude-files }}" ]; then
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            EXCLUDE_FILE_ARGS+=(-not -name "$file")
          done <<< "${{ inputs.exclude-files }}"
        fi

        while IFS= read -r path; do
          [ -z "$path" ] && continue

          if [ -d "$path" ]; then
            echo "Validating cluster YAML files in directory: $path"
            while IFS= read -r -d '' file; do
              # Skip files that don't contain ^helm: or ^kustomize:
              if ! grep -qE '^(helm|kustomize):' "$file"; then
                echo "  SKIP  $file (no helm/kustomize key)"
                continue
              fi
              if check-jsonschema --schemafile "$SCHEMA" "$file" > /dev/null 2>&1; then
                echo "  OK    $file"
              else
                echo "  FAIL  $file"
                FAILED_FILES+=("$file")
              fi
            done < <(find "$path" -type f \( -name "*.yaml" -o -name "*.yml" \) "${EXCLUDE_DIR_ARGS[@]}" "${EXCLUDE_FILE_ARGS[@]}" -print0)
          elif [ -f "$path" ]; then
            if grep -qE '^(helm|kustomize):' "$path"; then
              if check-jsonschema --schemafile "$SCHEMA" "$path" > /dev/null 2>&1; then
                echo "  OK    $path"
              else
                echo "  FAIL  $path"
                FAILED_FILES+=("$path")
              fi
            else
              echo "  SKIP  $path (no helm/kustomize key)"
            fi
          else
            echo "  WARN  Cluster path not found: $path"
          fi
        done <<< "${{ inputs.clusters }}"

        if [ ${#FAILED_FILES[@]} -gt 0 ]; then
          echo ""
          echo "Validation failed for the following files:"
          for f in "${FAILED_FILES[@]}"; do
            echo "  - $f"
          done
          exit 1
        fi

        echo "All cluster definitions are valid."

    - name: Validate workload definitions
      if: inputs.workloads != ''
      shell: bash
      run: |
        SCHEMA="/tmp/platform-schemas/applications.json"
        FAILED_FILES=()

        # Build exclude patterns for find
        EXCLUDE_DIR_ARGS=()
        if [ -n "${{ inputs.exclude-dirs }}" ]; then
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            EXCLUDE_DIR_ARGS+=(-not -path "*/${dir}/*")
          done <<< "${{ inputs.exclude-dirs }}"
        fi

        # Build exclude patterns for file names
        EXCLUDE_FILE_ARGS=()
        if [ -n "${{ inputs.exclude-files }}" ]; then
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            EXCLUDE_FILE_ARGS+=(-not -name "$file")
          done <<< "${{ inputs.exclude-files }}"
        fi

        while IFS= read -r path; do
          [ -z "$path" ] && continue

          if [ -d "$path" ]; then
            echo "Validating workload YAML files in directory: $path"
            while IFS= read -r -d '' file; do
              # Skip files that don't contain ^helm: or ^kustomize:
              if ! grep -qE '^(helm|kustomize):' "$file"; then
                echo "  SKIP  $file (no helm/kustomize key)"
                continue
              fi
              if check-jsonschema --schemafile "$SCHEMA" "$file" > /dev/null 2>&1; then
                echo "  OK    $file"
              else
                echo "  FAIL  $file"
                FAILED_FILES+=("$file")
              fi
            done < <(find "$path" -type f \( -name "*.yaml" -o -name "*.yml" \) "${EXCLUDE_DIR_ARGS[@]}" "${EXCLUDE_FILE_ARGS[@]}" -print0)
          elif [ -f "$path" ]; then
            if grep -qE '^(helm|kustomize):' "$path"; then
              if check-jsonschema --schemafile "$SCHEMA" "$path" > /dev/null 2>&1; then
                echo "  OK    $path"
              else
                echo "  FAIL  $path"
                FAILED_FILES+=("$path")
              fi
            else
              echo "  SKIP  $path (no helm/kustomize key)"
            fi
          else
            echo "  WARN  Workload path not found: $path"
          fi
        done <<< "${{ inputs.workloads }}"

        if [ ${#FAILED_FILES[@]} -gt 0 ]; then
          echo ""
          echo "Validation failed for the following files:"
          for f in "${FAILED_FILES[@]}"; do
            echo "  - $f"
          done
          exit 1
        fi

        echo "All workload definitions are valid."

---
kustomize:
  ## The feature label
  feature: aws_ack_prometheusservice
  category: aws
  description: IAM roles and Pod Identity associations for the Amazon Managed Prometheus ACK controller.
  link: https://aws-controllers-k8s.github.io/community/
  ## The entrypoint for the kustomize
  path: base
  ## The patches to apply to the kustomize
  patches:
    - target:
        kind: Role
        name: aws-ack-prometheusservice
      patch:
        - op: replace
          path: /spec/name
          key: .metadata.labels.cluster_name
          prefix: "aws-ack-prometheusservice-"
    - target:
        kind: PodIdentityAssociation
        name: aws-ack-prometheusservice
      patch:
        - op: replace
          path: /spec/clusterName
          key: .metadata.labels.cluster_name

## The namespace options
namespace:
  ## The namespace to deploy the resources
  name: ack-system

sync:
  phase: secondary

---
- feature: argocd
  category: gitops
  description: Declarative GitOps continuous delivery tool for Kubernetes.
  link: https://argo-cd.readthedocs.io/
  chart: argo-cd
  repository: https://argoproj.github.io/argo-helm
  version: "9.4.17"
  namespace: argocd
- feature: argo_events
  category: gitops
  description: Event-driven workflow automation framework for Kubernetes.
  link: https://argoproj.github.io/argo-events/
  chart: argo-events
  repository: https://argoproj.github.io/argo-helm
  version: "2.4.21"
  namespace: argocd
- feature: argo_rollouts
  category: gitops
  description: Progressive delivery controller for canary, blue-green, and experiments.
  link: https://argoproj.github.io/argo-rollouts/
  chart: argo-rollouts
  repository: https://argoproj.github.io/argo-helm
  version: "2.40.9"
  namespace: argocd-rollouts
- feature: argo_workflows
  category: gitops
  description: Workflow engine for orchestrating parallel jobs on Kubernetes.
  link: https://argoproj.github.io/argo-workflows/
  chart: argo-workflows
  repository: https://argoproj.github.io/argo-helm
  version: "1.0.6"
  namespace: argo-workflows
- feature: argocd_notifications
  category: gitops
  description: Enables ArgoCD to send notifications (Slack, Email, etc.) for application events.
  link: https://argo-cd.readthedocs.io/en/stable/operator-manual/notifications/
  chart: argocd-notifications
  repository: platform
  repository_path: charts/argocd-notifications
  version: "0.1.0"
  namespace: argocd
- feature: cert_manager
  category: security
  description: Automates TLS certificate issuance and renewal in Kubernetes.
  link: https://cert-manager.io/
  chart: cert-manager
  repository: https://charts.jetstack.io
  version: "v1.20.1"
  namespace: cert-manager
- feature: cilium
  category: networking
  description: eBPF-based CNI, service mesh, and network security for Kubernetes.
  link: https://cilium.io/
  chart: cilium
  repository: https://helm.cilium.io/
  version: "1.19.2"
  namespace: cilium-system
- feature: cluster_autoscaler
  category: compute
  description: Automatically adjusts the number of nodes in a cluster.
  link: https://github.com/kubernetes/autoscaler
  chart: cluster-autoscaler
  repository: https://kubernetes.github.io/autoscaler
  version: "9.56.0"
  namespace: kube-system
- feature: external_dns
  category: networking
  description: Synchronizes Kubernetes Services and Ingresses with DNS providers.
  link: https://github.com/kubernetes-sigs/external-dns
  chart: external-dns
  repository: https://kubernetes-sigs.github.io/external-dns
  version: "1.20.0"
  namespace: kube-system
- feature: external_secrets
  category: security
  description: Integrates external secret stores with Kubernetes Secrets.
  link: https://external-secrets.io/
  chart: external-secrets
  repository: https://charts.external-secrets.io
  version: "2.2.0"
  namespace: external-secrets
- feature: keda
  category: workloads
  description: Event-driven autoscaling for workloads and HTTP traffic.
  link: https://keda.sh/
  chart: keda
  repository: https://kedacore.github.io/charts
  version: "2.19.0"
  namespace: keda-system
- feature: kro
  category: platform
  description: Kubernetes Resource Orchestrator for managing groups of custom resources.
  link: https://kro.run/
  repository: oci://registry.k8s.io/kro/charts/kro
  repository_path: .
  version: "0.9.1"
  namespace: kro-system
- feature: kube_prometheus_stack
  category: observability
  description: Prometheus, Grafana, Alertmanager, and kube-state-metrics bundle.
  link: https://github.com/prometheus-community/helm-charts
  chart: kube-prometheus-stack
  repository: https://prometheus-community.github.io/helm-charts
  version: "79.12.0"
  namespace: prometheus
- feature: kubecost
  category: cost
  description: Kubernetes cost monitoring and allocation.
  link: https://www.kubecost.com/
  chart: kubecost
  repository: https://kubecost.github.io/kubecost
  version: "3.1.6"
  namespace: kubecost
  parameters:
    - name: global.clusterName
      value: metadata.labels.cluster_name
- feature: kyverno
  category: security
  description: Kubernetes-native policy engine for admission control and reporting.
  link: https://kyverno.io/
  chart: kyverno
  repository: https://kyverno.github.io/kyverno
  version: "3.7.1"
  namespace: kyverno-system
- feature: kyverno_policies
  category: security
  description: Opinionated Kyverno policies for the platform (chart in this repository).
  link: https://github.com/appvia/kubernetes-platform/tree/main/charts/kyverno-policies
  chart: kyverno-policies
  repository: platform
  repository_path: charts/kyverno-policies
  version: "0.1.0"
  namespace: kyverno-system
  parameters:
    - name: policies.denyExternalSecrets.aws.clusterName
      value: .metadata.labels.cluster_name
      default: ""
  sync:
    wave: 40
    phase: secondary
- feature: metrics_server
  category: observability
  description: Cluster-wide aggregator of resource usage metrics for HPA and kubectl top.
  link: https://github.com/kubernetes-sigs/metrics-server
  chart: metrics-server
  repository: https://kubernetes-sigs.github.io/metrics-server
  version: "3.13.0"
  namespace: kube-system
- feature: prometheus_adapter
  category: observability
  description: Exposes Prometheus metrics as custom metrics for the Kubernetes HPA.
  link: https://github.com/kubernetes-sigs/prometheus-adapter
  chart: prometheus-adapter
  repository: https://prometheus-community.github.io/helm-charts
  version: "4.14.2"
  namespace: prometheus
- feature: secrets_store_csi_driver
  category: security
  description: Mounts secrets from external stores into pods as volumes.
  link: https://secrets-store-csi-driver.sigs.k8s.io/
  chart: secrets-store-csi-driver
  repository: https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
  version: "1.5.6"
  namespace: kube-system
- feature: opencost
  category: cost
  description: Open source cost monitoring for Kubernetes workloads.
  link: https://www.opencost.io/
  chart: opencost
  repository: https://opencost.github.io/opencost-helm-chart
  version: "2.5.12"
  namespace: opencost
  parameters:
    - name: opencost.exporter.defaultClusterId
      value: .metadata.labels.cluster_name
- feature: terranetes
  category: platform
  description: Terranetes controller for provisioning cloud resources from Kubernetes.
  link: https://terranetes.appvia.io/
  chart: terranetes-controller
  repository: https://terranetes-controller.appvia.io
  version: "v0.5.4"
  namespace: terranetes-system
- feature: volcano
  category: workloads
  description: Batch scheduler for high-performance workloads and AI/ML jobs.
  link: https://volcano.sh/
  chart: volcano
  repository: https://volcano-sh.github.io/helm-charts
  version: "1.14.1"
  namespace: volcano-system
- feature: vpa
  category: compute
  description: Automatically adjusts CPU and memory requests for running pods.
  link: https://github.com/kubernetes/autoscaler/tree/master/vertical-pod-autoscaler
  chart: vpa
  repository: https://charts.fairwinds.com/stable
  version: "4.11.0"
  namespace: kube-system

---
- feature: aws_load_balancer
  category: networking
  description: AWS Load Balancer Controller for ALB/NLB and Gateway API integration.
  link: https://kubernetes-sigs.github.io/aws-load-balancer-controller/
  chart: aws-load-balancer-controller
  repository: https://aws.github.io/eks-charts
  version: "3.2.1"
  namespace: ingress-system
  parameters:
    - name: clusterName
      value: .metadata.labels.cluster_name
    - name: region
      value: .metadata.annotations.region
    - name: vpcTags.Name
      value: .metadata.labels.cluster_name
- feature: aws_ebs_csi_resources

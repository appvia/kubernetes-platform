  description: Default StorageClass and related helpers for AWS EBS CSI volumes.
  link: https://github.com/gitops-bridge-dev/gitops-bridge
  chart: aws-ebs-csi-classes
  repository: https://gitops-bridge-dev.github.io/gitops-bridge-helm-charts
  version: "1.0.0"
  namespace: kube-system
- feature: aws_cloudwatch_metrics
  category: observability
  description: CloudWatch agent for cluster and node metrics on EKS.
